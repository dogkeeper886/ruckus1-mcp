name: "Test: Clients"

on:
  workflow_dispatch:
    inputs:
      judge_mode:
        description: 'Judge mode'
        type: choice
        options:
          - simple
          - both
        default: simple
  workflow_call:
    inputs:
      judge_mode:
        type: string
        default: simple

jobs:
  test:
    uses: ./.github/workflows/test-run.yml
    with:
      tag: clients
      judge_mode: ${{ inputs.judge_mode }}
    secrets: inherit
