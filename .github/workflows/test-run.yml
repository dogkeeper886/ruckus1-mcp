name: Test Run (reusable)

on:
  workflow_call:
    inputs:
      tag:
        description: 'Feature tag to filter tests'
        required: true
        type: string
      judge_mode:
        description: 'Judge mode'
        required: false
        type: string
        default: 'simple'

jobs:
  test:
    runs-on: self-hosted
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Install dependencies
        run: npm install

      - name: Build
        run: npm run build

      - name: Install test dependencies
        run: cd cicd/tests && npm install

      - name: Run tests
        run: |
          cd cicd/tests
          if [ "${{ inputs.judge_mode }}" = "simple" ]; then
            npx tsx src/cli.ts run --tag ${{ inputs.tag }} --no-llm --format console
          else
            npx tsx src/cli.ts run --tag ${{ inputs.tag }} --format console
          fi
        env:
          RUCKUS_TENANT_ID: ${{ secrets.RUCKUS_TENANT_ID }}
          RUCKUS_CLIENT_ID: ${{ secrets.RUCKUS_CLIENT_ID }}
          RUCKUS_CLIENT_SECRET: ${{ secrets.RUCKUS_CLIENT_SECRET }}
          RUCKUS_REGION: ${{ secrets.RUCKUS_REGION }}
          LLM_JUDGE_URL: ${{ vars.LLM_JUDGE_URL }}
          LLM_JUDGE_MODEL: ${{ vars.LLM_JUDGE_MODEL }}
          TEST_AP_SERIAL: ${{ secrets.TEST_AP_SERIAL }}
