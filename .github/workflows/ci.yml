name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  build-and-test:
    runs-on: self-hosted

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Install dependencies
        run: npm install

      - name: Build
        run: npm run build

      - name: Install test dependencies
        run: cd cicd/tests && npm install

      - name: Run integration tests
        run: cd cicd/tests && npx tsx src/cli.ts run --no-llm --format console
        env:
          RUCKUS_TENANT_ID: ${{ secrets.RUCKUS_TENANT_ID }}
          RUCKUS_CLIENT_ID: ${{ secrets.RUCKUS_CLIENT_ID }}
          RUCKUS_CLIENT_SECRET: ${{ secrets.RUCKUS_CLIENT_SECRET }}
          RUCKUS_REGION: ${{ secrets.RUCKUS_REGION }}
