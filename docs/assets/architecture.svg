<svg xmlns="http://www.w3.org/2000/svg" width="820" height="724" viewBox="0 0 820 724" font-family="'Segoe UI', Helvetica, Arial, sans-serif">
  <defs>
    <marker id="arrow" markerWidth="12" markerHeight="12" refX="8" refY="5" orient="auto" markerUnits="userSpaceOnUse">
      <path d="M1,1 L9,5 L1,9" fill="none" stroke="#64748b" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round"/>
    </marker>
  </defs>

  <rect x="0" y="0" width="820" height="724" rx="14" fill="#ffffff"/>
  <rect x="0.5" y="0.5" width="819" height="723" rx="14" fill="none" stroke="#e2e8f0"/>

  <!-- Layer 1: MCP Client -->
  <rect x="90" y="40" width="640" height="96" rx="12" fill="#eff6ff" stroke="#2563eb" stroke-width="1.5"/>
  <text x="410" y="78" text-anchor="middle" font-size="20" font-weight="700" fill="#1e3a8a">MCP Client</text>
  <text x="410" y="106" text-anchor="middle" font-size="14" fill="#334155">Claude Desktop&#160;&#183;&#160;Claude Code&#160;&#183;&#160;Cline&#160;&#183;&#160;any MCP-compatible client</text>

  <!-- arrow 1 -->
  <line x1="410" y1="136" x2="410" y2="216" stroke="#64748b" stroke-width="1.8" marker-end="url(#arrow)"/>
  <rect x="455" y="158" width="300" height="34" rx="8" fill="#f1f5f9" stroke="#cbd5e1"/>
  <text x="605" y="180" text-anchor="middle" font-size="13" fill="#475569">MCP protocol over stdio (JSON-RPC)</text>

  <!-- Layer 2: MCP Server -->
  <rect x="90" y="220" width="640" height="120" rx="12" fill="#f5f3ff" stroke="#7c3aed" stroke-width="1.5"/>
  <text x="410" y="256" text-anchor="middle" font-size="20" font-weight="700" fill="#5b21b6">MCP Server</text>
  <text x="410" y="280" text-anchor="middle" font-size="13" fill="#64748b" font-family="'SFMono-Regular', Consolas, monospace">src/mcpServer.ts</text>
  <text x="410" y="308" text-anchor="middle" font-size="14" fill="#334155">73 tools&#160;&#183;&#160;registration &amp; routing&#160;&#183;&#160;schema validation&#160;&#183;&#160;error formatting</text>

  <!-- arrow 2 -->
  <line x1="410" y1="340" x2="410" y2="396" stroke="#64748b" stroke-width="1.8" marker-end="url(#arrow)"/>
  <rect x="455" y="350" width="200" height="34" rx="8" fill="#f1f5f9" stroke="#cbd5e1"/>
  <text x="555" y="372" text-anchor="middle" font-size="13" fill="#475569">in-process function calls</text>

  <!-- Layer 3: Service Layer -->
  <rect x="90" y="400" width="640" height="120" rx="12" fill="#f0fdfa" stroke="#0d9488" stroke-width="1.5"/>
  <text x="410" y="436" text-anchor="middle" font-size="20" font-weight="700" fill="#115e59">Service Layer</text>
  <text x="410" y="460" text-anchor="middle" font-size="13" fill="#64748b" font-family="'SFMono-Regular', Consolas, monospace">ruckusApiService.ts&#160;&#183;&#160;tokenService.ts</text>
  <text x="410" y="488" text-anchor="middle" font-size="14" fill="#334155">OAuth2 + JWT cache&#160;&#183;&#160;async polling&#160;&#183;&#160;retry&#160;&#183;&#160;error enrichment</text>

  <!-- arrow 3 -->
  <line x1="410" y1="520" x2="410" y2="596" stroke="#64748b" stroke-width="1.8" marker-end="url(#arrow)"/>
  <rect x="455" y="540" width="240" height="34" rx="8" fill="#f1f5f9" stroke="#cbd5e1"/>
  <text x="575" y="562" text-anchor="middle" font-size="13" fill="#475569">HTTPS&#160;&#183;&#160;OAuth2 Bearer token</text>

  <!-- Layer 4: RUCKUS One API -->
  <rect x="90" y="600" width="640" height="96" rx="12" fill="#fff7ed" stroke="#ea580c" stroke-width="1.5"/>
  <text x="410" y="638" text-anchor="middle" font-size="20" font-weight="700" fill="#9a3412">RUCKUS One API</text>
  <text x="410" y="666" text-anchor="middle" font-size="14" fill="#334155">multi-region cloud endpoints&#160;&#183;&#160;OAuth2-protected&#160;&#183;&#160;async activity tracking</text>
</svg>
