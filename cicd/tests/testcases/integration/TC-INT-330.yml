id: TC-INT-330
name: Self Sign-In back-compat default (no channel flags = Email-only)
suite: integration
tags: [wifi-networks, wifi-self-sign-in, guest-portal, self-sign-in]
story: STORY-014
priority: 1
timeout: 300000
dependencies:
  - TC-INT-001

steps:
  - name: Create portal service profile
    command: npx tsx cicd/tests/src/mcp-client.ts create_portal_service_profile '{"name":"mcp-test-portal-ssi-default-{{TEST_RUN_ID}}","content":{},"maxRetries":10,"pollIntervalMs":3000}'
    expectPatterns:
      - "requestId"
    rejectPatterns:
      - "isError"

  - name: Capture portal profile ID
    command: npx tsx cicd/tests/src/mcp-client.ts query_portal_service_profiles '{"searchString":"mcp-test-portal-ssi-default-{{TEST_RUN_ID}}"}'
    capture:
      profileId: "content[serviceName=mcp-test-portal-ssi-default-{{TEST_RUN_ID}}].id"
    expectPatterns:
      - "mcp-test-portal-ssi-default-{{TEST_RUN_ID}}"
    rejectPatterns:
      - "isError"

  - name: Create Self Sign-In without any channel flags (back-compat default)
    command: npx tsx cicd/tests/src/mcp-client.ts create_wifi_network '{"name":"mcp-test-ssi-default-{{TEST_RUN_ID}}","ssid":"MCP-Test-SSI-Default","type":"selfSignIn","wlanSecurity":"None","portalServiceProfileId":"{{profileId}}","allowedEmailDomains":["example.com"],"sessionDurationDays":7,"maxRetries":10,"pollIntervalMs":3000}'
    expectPatterns:
      - "networkId"
      - "completed"
    rejectPatterns:
      - "isError"

  - name: Capture network ID
    command: npx tsx cicd/tests/src/mcp-client.ts query_wifi_networks '{"searchString":"mcp-test-ssi-default-{{TEST_RUN_ID}}"}'
    capture:
      networkId: "data[name=mcp-test-ssi-default-{{TEST_RUN_ID}}].id"
    expectPatterns:
      - "mcp-test-ssi-default-{{TEST_RUN_ID}}"
    rejectPatterns:
      - "isError"

  - name: GET network - verify Email-only default persisted (no regression)
    command: npx tsx cicd/tests/src/mcp-client.ts get_wifi_network '{"networkId":"{{networkId}}"}'
    expectPatterns:
      - enableSmsLogin
      - enableEmailLogin
      - enableWhatsappLogin
      - smsPasswordDuration
      - '\bDAY\b'
      - SelfSignIn
      - socialDomains
      - example.com
      - socialEmails
    rejectPatterns:
      - "isError"
      - '\bHOUR\b'
      - '\bMINUTE\b'

  - name: Delete WiFi network
    command: npx tsx cicd/tests/src/mcp-client.ts delete_wifi_network '{"networkId":"{{networkId}}","maxRetries":10,"pollIntervalMs":3000}'
    expectPatterns:
      - "completed"
    rejectPatterns:
      - "isError"

  - name: Delete portal service profile
    command: npx tsx cicd/tests/src/mcp-client.ts delete_portal_service_profile '{"profileId":"{{profileId}}","maxRetries":10,"pollIntervalMs":3000}'
    expectPatterns:
      - "completed"
    rejectPatterns:
      - "isError"

criteria: |
  Guards the back-compat path of create_wifi_network for Self Sign-In — when
  the caller omits enableSmsLogin / enableEmailLogin / enableWhatsappLogin, the
  tool must behave exactly as before this change:
  1. Create a self-contained portal service profile
  2. Create a Self Sign-In network with no channel flags, only allowedEmailDomains
     and sessionDurationDays=7
  3. GET network — assert Email-only defaults: socialEmails=true, socialDomains
     contains the supplied domain, smsPasswordDuration.unit=DAY (proves the
     email-session legacy shape is preserved for callers that predate #67)
  4. Reject HOUR / MINUTE (would indicate the SMS-on branch accidentally fired)
  5. Cleanup: delete network, delete portal profile
