id: TC-INT-338
name: WISPr (3rd-party captive portal) WLAN lifecycle - create with external provider + AAA server, verify, delete
suite: integration
tags: [wifi-networks, captive-portal, wispr, radius-server]
story: STORY-009
priority: 1
timeout: 180000
dependencies:
  - TC-INT-001

steps:
  - name: Create RADIUS authentication profile (the 3rd-party AAA server)
    command: npx tsx cicd/tests/src/mcp-client.ts create_radius_server_profile '{"profileConfig":{"name":"mcp-test-wispr-radius-{{TEST_RUN_ID}}","type":"AUTHENTICATION","enableSecondaryServer":false,"primary":{"port":1812,"sharedSecret":"TestSecret123","ip":"10.88.88.88"}},"maxRetries":10,"pollIntervalMs":3000}'
    expectPatterns:
      - "completed"
    rejectPatterns:
      - "isError"

  - name: Capture RADIUS profile ID
    command: npx tsx cicd/tests/src/mcp-client.ts query_radius_server_profiles '{"pageSize":100}'
    capture:
      radiusId: "data[name=mcp-test-wispr-radius-{{TEST_RUN_ID}}].id"
    expectPatterns:
      - "mcp-test-wispr-radius-{{TEST_RUN_ID}}"
    rejectPatterns:
      - "isError"

  - name: Create WISPr WiFi network (external provider URL + AAA server binding)
    command: npx tsx cicd/tests/src/mcp-client.ts create_wifi_network '{"name":"mcp-test-wispr-{{TEST_RUN_ID}}","ssid":"MCP-Test-WISPr","type":"wispr","wlanSecurity":"None","wisprConfig":{"captivePortalUrl":"https://portal.example.com/login","providerName":"Custom Provider"},"radiusServiceProfileId":"{{radiusId}}","maxRetries":20,"pollIntervalMs":5000}'
    expectPatterns:
      - "networkId"
      - "completed"
      - "Associate RADIUS service profile"
    rejectPatterns:
      - "isError"

  - name: Verify network exists and capture ID
    command: npx tsx cicd/tests/src/mcp-client.ts query_wifi_networks '{"searchString":"mcp-test-wispr-{{TEST_RUN_ID}}"}'
    capture:
      networkId: "data[name=mcp-test-wispr-{{TEST_RUN_ID}}].id"
    expectPatterns:
      - "mcp-test-wispr-{{TEST_RUN_ID}}"
    rejectPatterns:
      - "isError"

  - name: Get network and verify WISPr external-provider config persisted
    command: npx tsx cicd/tests/src/mcp-client.ts get_wifi_network '{"networkId":"{{networkId}}"}'
    expectPatterns:
      - "WISPr"
      - "portal.example.com"
      - "Custom Provider"
    rejectPatterns:
      - "isError"

  - name: Delete WiFi network
    command: npx tsx cicd/tests/src/mcp-client.ts delete_wifi_network '{"networkId":"{{networkId}}","maxRetries":20,"pollIntervalMs":5000}'
    expectPatterns:
      - "completed"
    rejectPatterns:
      - "isError"

  - name: Delete RADIUS authentication profile
    command: npx tsx cicd/tests/src/mcp-client.ts delete_radius_server_profile '{"profileId":"{{radiusId}}","maxRetries":10,"pollIntervalMs":3000}'
    expectPatterns:
      - "completed"
    rejectPatterns:
      - "isError"

criteria: |
  Full WISPr (3rd Party Captive Portal) WLAN lifecycle (#96):

  1. Create a RADIUS AUTHENTICATION profile to act as the 3rd-party AAA server.
  2. Create the WLAN with type=wispr + wlanSecurity=None + wisprConfig (captivePortalUrl +
     providerName) + radiusServiceProfileId. Assert the create response includes the
     "Associate RADIUS service profile" activity — WISPr binds its AAA server via the same
     PUT /wifiNetworks/{id}/radiusServerProfiles/{id} endpoint as enterprise (confirmed by
     GUI trace, Custom Provider).
  3. get_wifi_network and verify the WISPr discriminator (guestNetworkType=WISPr) plus the
     external captive-portal URL and provider name persisted in guestPortal.wisprPage.
  4. Cleanup: delete WLAN, delete RADIUS profile.
