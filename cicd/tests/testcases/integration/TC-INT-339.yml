id: TC-INT-339
name: Cloudpath captive-portal WLAN lifecycle - create with enrollment URL + AAA server, verify, delete
suite: integration
tags: [wifi-networks, captive-portal, cloudpath, radius-server]
story: STORY-009
priority: 1
timeout: 180000
dependencies:
  - TC-INT-001

steps:
  - name: Create RADIUS authentication profile (the Cloudpath AAA server)
    command: npx tsx cicd/tests/src/mcp-client.ts create_radius_server_profile '{"profileConfig":{"name":"mcp-test-cloudpath-radius-{{TEST_RUN_ID}}","type":"AUTHENTICATION","enableSecondaryServer":false,"primary":{"port":1812,"sharedSecret":"TestSecret123","ip":"10.77.77.77"}},"maxRetries":10,"pollIntervalMs":3000}'
    expectPatterns:
      - "completed"
    rejectPatterns:
      - "isError"

  - name: Capture RADIUS profile ID
    command: npx tsx cicd/tests/src/mcp-client.ts query_radius_server_profiles '{"pageSize":100}'
    capture:
      radiusId: "data[name=mcp-test-cloudpath-radius-{{TEST_RUN_ID}}].id"
    expectPatterns:
      - "mcp-test-cloudpath-radius-{{TEST_RUN_ID}}"
    rejectPatterns:
      - "isError"

  - name: Create Cloudpath WiFi network (enrollment URL + AAA server + default walled garden)
    command: npx tsx cicd/tests/src/mcp-client.ts create_wifi_network '{"name":"mcp-test-cloudpath-{{TEST_RUN_ID}}","ssid":"MCP-Test-Cloudpath","type":"cloudpath","wlanSecurity":"None","cloudpathConfig":{"enrollmentUrl":"https://enroll.example.com/guest"},"radiusServiceProfileId":"{{radiusId}}","maxRetries":20,"pollIntervalMs":5000}'
    expectPatterns:
      - "networkId"
      - "completed"
      - "Associate RADIUS service profile"
    rejectPatterns:
      - "isError"

  - name: Verify network exists and capture ID
    command: npx tsx cicd/tests/src/mcp-client.ts query_wifi_networks '{"searchString":"mcp-test-cloudpath-{{TEST_RUN_ID}}"}'
    capture:
      networkId: "data[name=mcp-test-cloudpath-{{TEST_RUN_ID}}].id"
    expectPatterns:
      - "mcp-test-cloudpath-{{TEST_RUN_ID}}"
    rejectPatterns:
      - "isError"

  - name: Get network and verify Cloudpath enrollment config persisted
    command: npx tsx cicd/tests/src/mcp-client.ts get_wifi_network '{"networkId":"{{networkId}}"}'
    expectPatterns:
      - "Cloudpath"
      - "enroll.example.com"
      - "captive.apple.com"
    rejectPatterns:
      - "isError"

  - name: Delete WiFi network
    command: npx tsx cicd/tests/src/mcp-client.ts delete_wifi_network '{"networkId":"{{networkId}}","maxRetries":20,"pollIntervalMs":5000}'
    expectPatterns:
      - "completed"
    rejectPatterns:
      - "isError"

  - name: Delete RADIUS authentication profile
    command: npx tsx cicd/tests/src/mcp-client.ts delete_radius_server_profile '{"profileId":"{{radiusId}}","maxRetries":10,"pollIntervalMs":3000}'
    expectPatterns:
      - "completed"
    rejectPatterns:
      - "isError"

criteria: |
  Full Cloudpath captive-portal WLAN lifecycle (#94):

  1. Create a RADIUS AUTHENTICATION profile to act as the Cloudpath AAA server.
  2. Create the WLAN with type=cloudpath + wlanSecurity=None + cloudpathConfig (enrollmentUrl)
     + radiusServiceProfileId. Assert the create response includes the "Associate RADIUS
     service profile" activity — Cloudpath binds its AAA server via the same
     PUT /wifiNetworks/{id}/radiusServerProfiles/{id} endpoint as enterprise/WISPr
     (confirmed by GUI trace).
  3. get_wifi_network and verify the Cloudpath discriminator (guestNetworkType=Cloudpath),
     the enrollment URL (guestPortal.externalPortalUrl), and that the default captive-portal
     probe walled-garden list was injected (e.g. captive.apple.com).
  4. Cleanup: delete WLAN, delete RADIUS profile.
