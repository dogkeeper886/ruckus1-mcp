id: TC-INT-337
name: Directory (AD/LDAP) captive-portal WLAN lifecycle - create with directory binding, activate, deactivate, delete
suite: integration
tags: [wifi-networks, wifi-lifecycles, portal-service, directory-server, captive-portal]
story: STORY-009
priority: 1
timeout: 300000
dependencies:
  - TC-INT-001

steps:
  - name: Create test venue for directory WLAN activation
    command: npx tsx cicd/tests/src/mcp-client.ts create_ruckus_venue '{"venueConfig":{"name":"mcp-test-dirwlan-venue-{{TEST_RUN_ID}}","address":{"addressLine":"Taipei","city":"Taipei","country":"Taiwan"}},"maxRetries":10,"pollIntervalMs":3000}'
    expectPatterns:
      - "completed"
    rejectPatterns:
      - "isError"

  - name: Capture venue ID
    command: npx tsx cicd/tests/src/mcp-client.ts get_ruckus_venues '{}'
    capture:
      venueId: "data[name=mcp-test-dirwlan-venue-{{TEST_RUN_ID}}].id"
    expectPatterns:
      - "mcp-test-dirwlan-venue-{{TEST_RUN_ID}}"
    rejectPatterns:
      - "isError"

  - name: Create directory server profile (companion)
    command: npx tsx cicd/tests/src/mcp-client.ts create_directory_server_profile '{"profileConfig":{"name":"mcp-test-dirwlan-dir-{{TEST_RUN_ID}}","type":"LDAP","tlsEnabled":false,"host":"10.99.99.99","port":389,"domainName":"dc=test,dc=com","adminDomainName":"cn=admin,dc=test,dc=com","adminPassword":"TestPass123","identityName":"uid","identityEmail":"mail","identityPhone":"telephoneNumber","keyAttribute":"uid","attributeMappings":[{"name":"firstName","mappedByName":"givenName"}]},"maxRetries":10,"pollIntervalMs":3000}'
    expectPatterns:
      - "completed"
    rejectPatterns:
      - "isError"

  - name: Capture directory server profile ID
    command: npx tsx cicd/tests/src/mcp-client.ts query_directory_server_profiles '{"searchString":"mcp-test-dirwlan-dir-{{TEST_RUN_ID}}"}'
    capture:
      directoryServerProfileId: "data[name=mcp-test-dirwlan-dir-{{TEST_RUN_ID}}].id"
    expectPatterns:
      - "mcp-test-dirwlan-dir-{{TEST_RUN_ID}}"
    rejectPatterns:
      - "isError"

  - name: Create portal service profile (companion)
    command: npx tsx cicd/tests/src/mcp-client.ts create_portal_service_profile '{"profileConfig":{"serviceName":"mcp-test-dirwlan-portal-{{TEST_RUN_ID}}","content":{}},"maxRetries":10,"pollIntervalMs":3000}'
    expectPatterns:
      - "completed"
    rejectPatterns:
      - "isError"

  - name: Capture portal profile ID
    command: npx tsx cicd/tests/src/mcp-client.ts query_portal_service_profiles '{"searchString":"mcp-test-dirwlan-portal-{{TEST_RUN_ID}}"}'
    capture:
      profileId: "content[serviceName=mcp-test-dirwlan-portal-{{TEST_RUN_ID}}].id"
    expectPatterns:
      - "mcp-test-dirwlan-portal-{{TEST_RUN_ID}}"
    rejectPatterns:
      - "isError"

  - name: Create Directory WiFi network (binds portal + directory server profile)
    command: npx tsx cicd/tests/src/mcp-client.ts create_wifi_network '{"name":"mcp-test-dirwlan-{{TEST_RUN_ID}}","ssid":"MCP-Test-DirWlan","type":"directory","wlanSecurity":"None","portalServiceProfileId":"{{profileId}}","directoryServerProfileId":"{{directoryServerProfileId}}","maxRetries":20,"pollIntervalMs":5000}'
    expectPatterns:
      - "networkId"
      - "completed"
      - "Associate directory server profile"
    rejectPatterns:
      - "isError"

  - name: Verify network exists and capture ID
    command: npx tsx cicd/tests/src/mcp-client.ts query_wifi_networks '{"searchString":"mcp-test-dirwlan-{{TEST_RUN_ID}}"}'
    capture:
      networkId: "data[name=mcp-test-dirwlan-{{TEST_RUN_ID}}].id"
    expectPatterns:
      - "mcp-test-dirwlan-{{TEST_RUN_ID}}"
    rejectPatterns:
      - "isError"

  - name: Activate directory WLAN at venue
    command: npx tsx cicd/tests/src/mcp-client.ts activate_wifi_network_at_venues '{"networkId":"{{networkId}}","venueConfigs":[{"venueId":"{{venueId}}","isAllApGroups":true,"allApGroupsRadio":"Both","allApGroupsRadioTypes":["2.4-GHz","5-GHz"],"scheduler":{"type":"ALWAYS_ON"}}],"maxRetries":15,"pollIntervalMs":3000}'
    expectPatterns:
      - "completed"
    rejectPatterns:
      - "isError"

  - name: Deactivate directory WLAN from venue
    command: npx tsx cicd/tests/src/mcp-client.ts deactivate_wifi_network_at_venues '{"networkId":"{{networkId}}","venueIds":["{{venueId}}"],"maxRetries":15,"pollIntervalMs":3000}'
    expectPatterns:
      - "completed"
    rejectPatterns:
      - "isError"

  - name: Delete WiFi network
    command: npx tsx cicd/tests/src/mcp-client.ts delete_wifi_network '{"networkId":"{{networkId}}","maxRetries":20,"pollIntervalMs":5000}'
    expectPatterns:
      - "completed"
    rejectPatterns:
      - "isError"

  - name: Delete portal service profile
    command: npx tsx cicd/tests/src/mcp-client.ts delete_portal_service_profile '{"profileId":"{{profileId}}","maxRetries":10,"pollIntervalMs":3000}'
    expectPatterns:
      - "completed"
    rejectPatterns:
      - "isError"

  - name: Delete directory server profile
    command: npx tsx cicd/tests/src/mcp-client.ts delete_directory_server_profile '{"profileId":"{{directoryServerProfileId}}","maxRetries":10,"pollIntervalMs":3000}'
    expectPatterns:
      - "completed"
    rejectPatterns:
      - "isError"

  - name: Delete test venue
    command: npx tsx cicd/tests/src/mcp-client.ts delete_ruckus_venue '{"venueId":"{{venueId}}","maxRetries":10,"pollIntervalMs":3000}'
    expectPatterns:
      - "completed"
    rejectPatterns:
      - "isError"

criteria: |
  Full Directory (Active Directory/LDAP) captive-portal WLAN lifecycle (#95), including
  venue activation:

  1. Create a test venue + directory server profile + portal service profile (companions).
  2. Create the WLAN with type=directory + portalServiceProfileId + directoryServerProfileId
     + wlanSecurity=None. Assert the create response includes the "Associate directory server
     profile" activity (the new PUT /wifiNetworks/{id}/directoryServerProfiles/{id} binding).
  3. Activate the WLAN at the venue (ALWAYS_ON) and confirm it completes — verifies a directory
     captive-portal WLAN activates cleanly (the directory binding is network-level and persists).
  4. Deactivate from the venue.
  5. Cleanup: delete WLAN, portal profile, directory server profile, venue.
