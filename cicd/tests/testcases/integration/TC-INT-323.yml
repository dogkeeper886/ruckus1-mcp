id: TC-INT-323
name: DSAE WiFi network lifecycle - create, activate, deactivate, delete
suite: integration
tags: [wifi-networks, wifi-lifecycles, dsae, dpsk-services, identity-groups]
story: STORY-012
priority: 1
timeout: 360000
dependencies:
  - TC-INT-001

steps:
  - name: Create identity group for DSAE
    command: npx tsx cicd/tests/src/mcp-client.ts create_identity_group '{"name":"mcp-test-idgroup-dsae-ci-{{TEST_RUN_ID}}","maxRetries":10,"pollIntervalMs":3000}'
    expectPatterns:
      - "completed"
    rejectPatterns:
      - "isError"

  - name: Capture identity group ID
    command: npx tsx cicd/tests/src/mcp-client.ts query_identity_groups '{"keyword":"mcp-test-idgroup-dsae-ci-{{TEST_RUN_ID}}"}'
    capture:
      identityGroupId: "content[name=mcp-test-idgroup-dsae-ci-{{TEST_RUN_ID}}].id"
    expectPatterns:
      - "mcp-test-idgroup-dsae-ci-{{TEST_RUN_ID}}"
    rejectPatterns:
      - "isError"

  - name: Create DPSK service for DSAE
    command: npx tsx cicd/tests/src/mcp-client.ts create_dpsk_service '{"identityGroupId":"{{identityGroupId}}","name":"mcp-test-dpsk-dsae-ci-{{TEST_RUN_ID}}","maxRetries":10,"pollIntervalMs":3000}'
    expectPatterns:
      - "completed"
    rejectPatterns:
      - "isError"

  - name: Capture DPSK service ID
    command: npx tsx cicd/tests/src/mcp-client.ts query_dpsk_services '{}'
    capture:
      dpskServiceId: "content[name=mcp-test-dpsk-dsae-ci-{{TEST_RUN_ID}}].id"
    expectPatterns:
      - "mcp-test-dpsk-dsae-ci-{{TEST_RUN_ID}}"
    rejectPatterns:
      - "isError"

  - name: Create test venue for DSAE activation
    command: npx tsx cicd/tests/src/mcp-client.ts create_ruckus_venue '{"name":"mcp-test-venue-dsae-{{TEST_RUN_ID}}","addressLine":"Taipei","city":"Taipei","country":"Taiwan","maxRetries":10,"pollIntervalMs":3000}'
    expectPatterns:
      - "completed"
    rejectPatterns:
      - "isError"

  - name: Capture venue ID
    command: npx tsx cicd/tests/src/mcp-client.ts get_ruckus_venues '{}'
    capture:
      venueId: "data[name=mcp-test-venue-dsae-{{TEST_RUN_ID}}].id"
    expectPatterns:
      - "mcp-test-venue-dsae-{{TEST_RUN_ID}}"
    rejectPatterns:
      - "isError"

  - name: Create DSAE WiFi network
    command: npx tsx cicd/tests/src/mcp-client.ts create_wifi_network '{"name":"mcp-test-dsae-ci-{{TEST_RUN_ID}}","ssid":"MCP-Test-DSAE-CI","type":"dpsk","wlanSecurity":"WPA23Mixed","dpskServiceId":"{{dpskServiceId}}","maxRetries":10,"pollIntervalMs":3000}'
    expectPatterns:
      - "networkId"
      - "completed"
    rejectPatterns:
      - "isError"

  - name: Verify dual-network pair created with DSAE fields
    command: npx tsx cicd/tests/src/mcp-client.ts query_wifi_networks '{"searchString":"mcp-test-dsae-ci-{{TEST_RUN_ID}}"}'
    capture:
      networkId: "data[name=mcp-test-dsae-ci-{{TEST_RUN_ID}}].id"
      # The DSAE companion is NOT a separate data[] entry (unlike OWE-TR).
      # It's nested inside the primary record as dsaeOnboardNetwork = {id, name, ...}.
      # Confirmed against a live response: the companion's name is
      # `<primary>-dpsk3-wpa2` and its id is the sibling of the name.
      companionId: "data[name=mcp-test-dsae-ci-{{TEST_RUN_ID}}].dsaeOnboardNetwork.id"
    expectPatterns:
      - "mcp-test-dsae-ci-{{TEST_RUN_ID}}"
      - "WPA23Mixed"
      - "dsaeOnboardNetwork"
      - "mcp-test-dsae-ci-{{TEST_RUN_ID}}-dpsk3-wpa2"
    rejectPatterns:
      - "isError"

  - name: Activate DSAE network at venue
    command: npx tsx cicd/tests/src/mcp-client.ts activate_wifi_network_at_venues '{"networkId":"{{networkId}}","venueConfigs":[{"venueId":"{{venueId}}","isAllApGroups":true,"allApGroupsRadio":"Both","allApGroupsRadioTypes":["2.4-GHz","5-GHz","6-GHz"],"scheduler":{"type":"ALWAYS_ON"}}],"maxRetries":10,"pollIntervalMs":3000}'
    expectPatterns:
      - "completed"
    rejectPatterns:
      - "isError"
      - "dsaeOnboardNetwork"

  - name: Deactivate DSAE network from venue
    command: npx tsx cicd/tests/src/mcp-client.ts deactivate_wifi_network_at_venues '{"networkId":"{{networkId}}","venueIds":["{{venueId}}"],"maxRetries":10,"pollIntervalMs":3000}'
    expectPatterns:
      - "completed"
    rejectPatterns:
      - "isError"

  - name: Delete DSAE WiFi network
    command: npx tsx cicd/tests/src/mcp-client.ts delete_wifi_network '{"networkId":"{{networkId}}","maxRetries":10,"pollIntervalMs":3000}'
    expectPatterns:
      - "completed"
    rejectPatterns:
      - "isError"

  - name: Verify DSAE network and companion are gone
    command: npx tsx cicd/tests/src/mcp-client.ts query_wifi_networks '{"searchString":"mcp-test-dsae-ci-{{TEST_RUN_ID}}"}'
    expectPatterns:
      - "content"
    rejectPatterns:
      - "{{networkId}}"
      - "{{companionId}}"

  - name: Delete DPSK service
    command: npx tsx cicd/tests/src/mcp-client.ts delete_dpsk_service '{"dpskServiceId":"{{dpskServiceId}}","maxRetries":10,"pollIntervalMs":3000}'
    expectPatterns:
      - "completed"
    rejectPatterns:
      - "isError"

  - name: Delete identity group
    command: npx tsx cicd/tests/src/mcp-client.ts delete_identity_group '{"identityGroupId":"{{identityGroupId}}","maxRetries":10,"pollIntervalMs":3000}'
    expectPatterns:
      - "completed"
    rejectPatterns:
      - "isError"

  - name: Delete test venue
    command: npx tsx cicd/tests/src/mcp-client.ts delete_ruckus_venue '{"venueId":"{{venueId}}","maxRetries":10,"pollIntervalMs":3000}'
    expectPatterns:
      - "completed"
    rejectPatterns:
      - "isError"

criteria: |
  Full DSAE WiFi network lifecycle with all dependencies:
  1. Create identity group (prerequisite for DPSK service)
  2. Create DPSK service under identity group
  3. Create test venue for activation
  4. Create DSAE network (type=dpsk, wlanSecurity=WPA23Mixed, dpskServiceId)
  5. Verify dual-network pair: primary appears in data[] with dsaeOnboardNetwork
     nested field containing the companion's {id, name="<primary>-dpsk3-wpa2",
     securityProtocol=WPA2Personal, ...}. Capture both primary id and
     companion id. NOTE: unlike OWE-TR, the DSAE companion is NOT a separate
     data[] entry — it's nested inside the primary as dsaeOnboardNetwork.
  6. Activate at venue - verify no 422 errors from read-only fields
  7. Deactivate from venue
  8. Delete network, verify primary AND companion (by captured IDs) are
     both gone from query results — proves cascade-delete of companion.
  9. Clean up: DPSK service, identity group, venue
