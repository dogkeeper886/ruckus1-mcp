id: TC-INT-012
name: Get roles returns list of roles
suite: integration
story: STORY-008
priority: 1
timeout: 30000
dependencies: []

steps:
  - name: Query all roles
    command: npx tsx cicd/tests/src/mcp-client.ts get_ruckus_roles '{}'
    expectPatterns:
      - "content"
      - "text"
    rejectPatterns:
      - "isError"

criteria: |
  Verify get_ruckus_roles returns a valid response containing
  role data. The tool requires no parameters and should return
  the list of roles configured in RUCKUS One.
