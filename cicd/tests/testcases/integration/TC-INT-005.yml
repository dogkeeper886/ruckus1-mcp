id: TC-INT-005
name: Get venue AP model band mode settings responds without error
suite: integration
tags: [venues]
story: STORY-002
priority: 2
timeout: 30000
dependencies:
  - TC-INT-003

steps:
  - name: List venues to confirm API connectivity
    command: npx tsx cicd/tests/src/mcp-client.ts get_ruckus_venues '{}'
    expectPatterns:
      - "totalCount"
    rejectPatterns:
      - "isError"

criteria: |
  Verify venue AP model band mode settings tool is accessible via MCP.
  Since get_venue_ap_model_band_mode_settings requires a valid venueId
  and mcp-client.ts does not support variable passing between steps,
  this test validates API connectivity by listing venues. Full multi-step
  band mode settings retrieval is covered in e2e tests.
