id: TC-INT-334
name: Click-Through WiFi network lifecycle - create, verify captiveType, delete
suite: integration
tags: [wifi-networks, wifi-lifecycles, portal-service, captive-portal]
story: STORY-017
priority: 1
timeout: 180000
dependencies:
  - TC-INT-001

steps:
  - name: Create portal service profile
    command: npx tsx cicd/tests/src/mcp-client.ts create_portal_service_profile '{"profileConfig":{"name":"mcp-test-portal-ct-{{TEST_RUN_ID}}","content":{}},"maxRetries":10,"pollIntervalMs":3000}'
    expectPatterns:
      - "completed"
    rejectPatterns:
      - "isError"

  - name: Capture portal profile ID
    command: npx tsx cicd/tests/src/mcp-client.ts query_portal_service_profiles '{"searchString":"mcp-test-portal-ct-{{TEST_RUN_ID}}"}'
    capture:
      profileId: "content[serviceName=mcp-test-portal-ct-{{TEST_RUN_ID}}].id"
    expectPatterns:
      - "mcp-test-portal-ct-{{TEST_RUN_ID}}"
    rejectPatterns:
      - "isError"

  - name: Create Click-Through WiFi network
    command: npx tsx cicd/tests/src/mcp-client.ts create_wifi_network '{"name":"mcp-test-clickthrough-{{TEST_RUN_ID}}","ssid":"MCP-Test-ClickThrough","type":"clickThrough","wlanSecurity":"None","portalServiceProfileId":"{{profileId}}","maxRetries":20,"pollIntervalMs":5000}'
    expectPatterns:
      - "networkId"
      - "completed"
    rejectPatterns:
      - "isError"

  - name: Verify network has captiveType=ClickThrough
    command: npx tsx cicd/tests/src/mcp-client.ts query_wifi_networks '{"searchString":"mcp-test-clickthrough-{{TEST_RUN_ID}}"}'
    capture:
      networkId: "data[name=mcp-test-clickthrough-{{TEST_RUN_ID}}].id"
    expectPatterns:
      - "mcp-test-clickthrough-{{TEST_RUN_ID}}"
      - "ClickThrough"
      - "captiveType"
    rejectPatterns:
      - "isError"
      - "GuestPass"

  - name: Delete WiFi network
    command: npx tsx cicd/tests/src/mcp-client.ts delete_wifi_network '{"networkId":"{{networkId}}","maxRetries":20,"pollIntervalMs":5000}'
    expectPatterns:
      - "completed"
    rejectPatterns:
      - "isError"

  - name: Delete portal service profile
    command: npx tsx cicd/tests/src/mcp-client.ts delete_portal_service_profile '{"profileId":"{{profileId}}","maxRetries":10,"pollIntervalMs":3000}'
    expectPatterns:
      - "completed"
    rejectPatterns:
      - "isError"

criteria: |
  Verify the new type=clickThrough enum value produces a Click-Through captive
  portal. Proves the schema fix for issue #92: previously the only path to a
  Click-Through portal was an undocumented guestPortal override; type=clickThrough
  now exposes it as a first-class choice.

  1. Create a portal service profile (portal-type-agnostic; same shape for any
     captive-portal sub-type).
  2. Create WLAN with type=clickThrough + portalServiceProfileId + wlanSecurity=None.
  3. Query the WLAN and assert the GET-back response includes captiveType=ClickThrough.
     Also reject GuestPass to guard against the silent-default bug returning.
  4. Cleanup: delete WLAN, delete portal profile.
