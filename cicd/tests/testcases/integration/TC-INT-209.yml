id: TC-INT-209
name: PSK WiFi network lifecycle - create, query, delete
suite: integration
tags: [wifi-networks]
story: STORY-009
priority: 1
timeout: 180000
dependencies:
  - TC-INT-001

steps:
  - name: Create PSK WiFi network
    command: npx tsx cicd/tests/src/mcp-client.ts create_wifi_network '{"name":"mcp-test-wifi-psk","ssid":"MCP-Test-PSK","type":"psk","passphrase":"TestPass1234!","wlanSecurity":"WPA2Personal","maxRetries":10,"pollIntervalMs":3000}'
    expectPatterns:
      - "requestId"
    rejectPatterns:
      - "isError"

  - name: Find created network and capture ID
    command: npx tsx cicd/tests/src/mcp-client.ts query_wifi_networks '{"searchString":"mcp-test-wifi-psk"}'
    capture:
      networkId: "data[name=mcp-test-wifi-psk].id"
    expectPatterns:
      - "mcp-test-wifi-psk"
    rejectPatterns:
      - "isError"

  - name: Delete WiFi network
    command: npx tsx cicd/tests/src/mcp-client.ts delete_wifi_network '{"networkId":"{{networkId}}","maxRetries":10,"pollIntervalMs":3000}'
    expectPatterns:
      - "completed"
    rejectPatterns:
      - "isError"
      - "\"status\": \"failed\""

  - name: Verify network is gone
    command: npx tsx cicd/tests/src/mcp-client.ts query_wifi_networks '{"searchString":"mcp-test-wifi-psk"}'
    expectPatterns:
      - "content"
    rejectPatterns:
      - "mcp-test-wifi-psk"

criteria: |
  Full PSK WiFi network lifecycle:
  1. Create a PSK WiFi network with WPA2Personal security
  2. Query to find it and capture networkId
  3. Delete using captured networkId (not activated, so no deactivation needed)
  4. Verify it no longer appears in query results
