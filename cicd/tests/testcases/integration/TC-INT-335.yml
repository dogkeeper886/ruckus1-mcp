id: TC-INT-335
name: Guest Pass WiFi network via new type=guestPass - regression for rename
suite: integration
tags: [wifi-networks, wifi-lifecycles, portal-service, captive-portal]
story: STORY-017
priority: 1
timeout: 180000
dependencies:
  - TC-INT-001

steps:
  - name: Create portal service profile
    command: npx tsx cicd/tests/src/mcp-client.ts create_portal_service_profile '{"profileConfig":{"name":"mcp-test-portal-gp-{{TEST_RUN_ID}}","content":{}},"maxRetries":10,"pollIntervalMs":3000}'
    expectPatterns:
      - "completed"
    rejectPatterns:
      - "isError"

  - name: Capture portal profile ID
    command: npx tsx cicd/tests/src/mcp-client.ts query_portal_service_profiles '{"searchString":"mcp-test-portal-gp-{{TEST_RUN_ID}}"}'
    capture:
      profileId: "content[serviceName=mcp-test-portal-gp-{{TEST_RUN_ID}}].id"
    expectPatterns:
      - "mcp-test-portal-gp-{{TEST_RUN_ID}}"
    rejectPatterns:
      - "isError"

  - name: Create Guest Pass WiFi network with new type=guestPass
    command: npx tsx cicd/tests/src/mcp-client.ts create_wifi_network '{"name":"mcp-test-guestpass-{{TEST_RUN_ID}}","ssid":"MCP-Test-GuestPass","type":"guestPass","wlanSecurity":"None","portalServiceProfileId":"{{profileId}}","maxRetries":20,"pollIntervalMs":5000}'
    expectPatterns:
      - "networkId"
      - "completed"
    rejectPatterns:
      - "isError"

  - name: Verify network has captiveType=GuestPass
    command: npx tsx cicd/tests/src/mcp-client.ts query_wifi_networks '{"searchString":"mcp-test-guestpass-{{TEST_RUN_ID}}"}'
    capture:
      networkId: "data[name=mcp-test-guestpass-{{TEST_RUN_ID}}].id"
    expectPatterns:
      - "mcp-test-guestpass-{{TEST_RUN_ID}}"
      - "GuestPass"
      - "captiveType"
    rejectPatterns:
      - "isError"

  - name: Delete WiFi network
    command: npx tsx cicd/tests/src/mcp-client.ts delete_wifi_network '{"networkId":"{{networkId}}","maxRetries":20,"pollIntervalMs":5000}'
    expectPatterns:
      - "completed"
    rejectPatterns:
      - "isError"

  - name: Delete portal service profile
    command: npx tsx cicd/tests/src/mcp-client.ts delete_portal_service_profile '{"profileId":"{{profileId}}","maxRetries":10,"pollIntervalMs":3000}'
    expectPatterns:
      - "completed"
    rejectPatterns:
      - "isError"

criteria: |
  Regression test for the type=guest → type=guestPass rename in issue #92.
  Proves that the explicit, agent-friendly type=guestPass produces the same
  Guest Pass behavior the old type=guest used to. Same captiveType=GuestPass
  wire value, same end-user flow (pre-issued password sign-in).

  1. Create a portal service profile.
  2. Create WLAN with type=guestPass.
  3. Query and assert captiveType=GuestPass appears in the GET-back response.
  4. Cleanup.
