id: TC-INT-301
name: Activity details with invalid request ID returns error
suite: integration
tags: [auth]
story: STORY-001
priority: 3
timeout: 30000
dependencies: []

steps:
  - name: Query activity with completely invalid ID format
    command: npx tsx cicd/tests/src/mcp-client.ts get_ruckus_activity_details '{"activityId":"not-a-valid-uuid"}'
    expectError: true
    expectPatterns:
      - isError
      - ACTIVITY-10001
      - activity doesn't exist
      - not-a-valid-uuid
    rejectPatterns:
      - useCase

criteria: |
  Verify get_ruckus_activity_details rejects an invalid UUID format with a structured
  error. Asserts the MCP isError flag, the specific RUCKUS error code ACTIVITY-10001,
  the human-readable "activity doesn't exist" phrase, and that the echoed ID
  "not-a-valid-uuid" appears in the error message. Rejects the useCase field that
  only appears in a successful activity-details response.
