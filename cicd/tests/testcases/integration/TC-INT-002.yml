id: TC-INT-002
name: Get activity details with dummy request ID
suite: integration
tags: [auth]
story: STORY-001
priority: 2
timeout: 30000
dependencies: []

steps:
  - name: Query activity details with a non-existent request ID
    command: npx tsx cicd/tests/src/mcp-client.ts get_ruckus_activity_details '{"requestId":"00000000-0000-0000-0000-000000000000"}'
    expectPatterns:
      - "content"
    rejectPatterns: []

criteria: |
  Verify get_ruckus_activity_details accepts a request ID and returns a structured MCP response.
  - Tool executes without crashing
  - Response contains MCP content structure (may be an error for unknown ID)
  - Confirms the activity details endpoint is reachable and handles unknown IDs gracefully
