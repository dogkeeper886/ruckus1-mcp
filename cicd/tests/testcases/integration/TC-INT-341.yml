id: TC-INT-341
name: SAML IdP captive-portal WLAN lifecycle - create with SAML IdP binding, activate, deactivate, delete
suite: integration
tags: [wifi-networks, wifi-lifecycles, portal-service, saml-idp, captive-portal]
story: STORY-025
priority: 1
timeout: 300000
dependencies:
  - TC-INT-001

# FIXTURE DEPENDENCY: the SAML IdP profile create fetches its metadata URL server-side, so
# R1's backend must reach the IdP. Provide the URL via the SAML_IDP_METADATA_URL env var, and
# the IdP hostname via SAML_IDP_HOST (used as the WLAN's walled-garden entry so captive-portal
# clients can reach the IdP pre-auth). Both are substituted from the environment by the runner.

steps:
  - name: Create test venue for SAML WLAN activation
    command: npx tsx cicd/tests/src/mcp-client.ts create_ruckus_venue '{"venueConfig":{"name":"mcp-test-samlwlan-venue-{{TEST_RUN_ID}}","address":{"addressLine":"Taipei","city":"Taipei","country":"Taiwan"}},"maxRetries":10,"pollIntervalMs":3000}'
    expectPatterns:
      - "completed"
    rejectPatterns:
      - "isError"

  - name: Capture venue ID
    command: npx tsx cicd/tests/src/mcp-client.ts get_ruckus_venues '{}'
    capture:
      venueId: "data[name=mcp-test-samlwlan-venue-{{TEST_RUN_ID}}].id"
    expectPatterns:
      - "mcp-test-samlwlan-venue-{{TEST_RUN_ID}}"
    rejectPatterns:
      - "isError"

  - name: Create SAML IdP profile (companion)
    command: npx tsx cicd/tests/src/mcp-client.ts create_saml_idp_profile '{"profileConfig":{"name":"mcp-test-samlwlan-idp-{{TEST_RUN_ID}}","metadataUrl":"{{SAML_IDP_METADATA_URL}}"},"maxRetries":10,"pollIntervalMs":3000}'
    expectPatterns:
      - "completed"
    rejectPatterns:
      - "isError"

  - name: Capture SAML IdP profile ID
    command: npx tsx cicd/tests/src/mcp-client.ts query_saml_idp_profiles '{"searchString":"mcp-test-samlwlan-idp-{{TEST_RUN_ID}}"}'
    capture:
      samlIdpProfileId: "data[name=mcp-test-samlwlan-idp-{{TEST_RUN_ID}}].id"
    expectPatterns:
      - "mcp-test-samlwlan-idp-{{TEST_RUN_ID}}"
    rejectPatterns:
      - "isError"

  - name: Create portal service profile (companion)
    command: npx tsx cicd/tests/src/mcp-client.ts create_portal_service_profile '{"profileConfig":{"serviceName":"mcp-test-samlwlan-portal-{{TEST_RUN_ID}}","content":{}},"maxRetries":10,"pollIntervalMs":3000}'
    expectPatterns:
      - "completed"
    rejectPatterns:
      - "isError"

  - name: Capture portal profile ID
    command: npx tsx cicd/tests/src/mcp-client.ts query_portal_service_profiles '{"searchString":"mcp-test-samlwlan-portal-{{TEST_RUN_ID}}"}'
    capture:
      profileId: "content[serviceName=mcp-test-samlwlan-portal-{{TEST_RUN_ID}}].id"
    expectPatterns:
      - "mcp-test-samlwlan-portal-{{TEST_RUN_ID}}"
    rejectPatterns:
      - "isError"

  - name: Create SAML WiFi network (binds portal + SAML IdP profile)
    command: npx tsx cicd/tests/src/mcp-client.ts create_wifi_network '{"name":"mcp-test-samlwlan-{{TEST_RUN_ID}}","ssid":"MCP-Test-SamlWlan","type":"saml","wlanSecurity":"None","portalServiceProfileId":"{{profileId}}","samlIdpProfileId":"{{samlIdpProfileId}}","guestPortal":{"walledGardens":["{{SAML_IDP_HOST}}"]},"maxRetries":20,"pollIntervalMs":5000}'
    expectPatterns:
      - "networkId"
      - "completed"
      - "Associate SAML IdP profile"
    rejectPatterns:
      - "isError"

  - name: Verify network exists with captiveType SAML and capture ID
    command: npx tsx cicd/tests/src/mcp-client.ts query_wifi_networks '{"searchString":"mcp-test-samlwlan-{{TEST_RUN_ID}}"}'
    capture:
      networkId: "data[name=mcp-test-samlwlan-{{TEST_RUN_ID}}].id"
    expectPatterns:
      - "mcp-test-samlwlan-{{TEST_RUN_ID}}"
      - "SAML"
    rejectPatterns:
      - "isError"

  - name: Activate SAML WLAN at venue
    command: npx tsx cicd/tests/src/mcp-client.ts activate_wifi_network_at_venues '{"networkId":"{{networkId}}","venueConfigs":[{"venueId":"{{venueId}}","isAllApGroups":true,"allApGroupsRadio":"Both","allApGroupsRadioTypes":["2.4-GHz","5-GHz"],"scheduler":{"type":"ALWAYS_ON"}}],"maxRetries":15,"pollIntervalMs":3000}'
    expectPatterns:
      - "completed"
    rejectPatterns:
      - "isError"

  - name: Deactivate SAML WLAN from venue
    command: npx tsx cicd/tests/src/mcp-client.ts deactivate_wifi_network_at_venues '{"networkId":"{{networkId}}","venueIds":["{{venueId}}"],"maxRetries":15,"pollIntervalMs":3000}'
    expectPatterns:
      - "completed"
    rejectPatterns:
      - "isError"

  - name: Delete WiFi network
    command: npx tsx cicd/tests/src/mcp-client.ts delete_wifi_network '{"networkId":"{{networkId}}","maxRetries":20,"pollIntervalMs":5000}'
    expectPatterns:
      - "completed"
    rejectPatterns:
      - "isError"

  - name: Delete portal service profile
    command: npx tsx cicd/tests/src/mcp-client.ts delete_portal_service_profile '{"profileId":"{{profileId}}","maxRetries":10,"pollIntervalMs":3000}'
    expectPatterns:
      - "completed"
    rejectPatterns:
      - "isError"

  - name: Delete SAML IdP profile
    command: npx tsx cicd/tests/src/mcp-client.ts delete_saml_idp_profile '{"profileId":"{{samlIdpProfileId}}","maxRetries":10,"pollIntervalMs":3000}'
    expectPatterns:
      - "completed"
    rejectPatterns:
      - "isError"

  - name: Delete test venue
    command: npx tsx cicd/tests/src/mcp-client.ts delete_ruckus_venue '{"venueId":"{{venueId}}","maxRetries":10,"pollIntervalMs":3000}'
    expectPatterns:
      - "completed"
    rejectPatterns:
      - "isError"

criteria: |
  Full SAML IdP captive-portal WLAN lifecycle (#97 / STORY-025), including venue activation:

  1. Create a test venue + SAML IdP profile + portal service profile (companions). The SAML
     IdP profile's metadata URL comes from SAML_IDP_METADATA_URL (fetched server-side by R1).
  2. Create the WLAN with type=saml + portalServiceProfileId + samlIdpProfileId +
     wlanSecurity=None. Assert the create response includes the "Associate SAML IdP profile"
     activity (the new PUT /wifiNetworks/{id}/samlIdpProfiles/{id} binding) and that the WLAN
     queries back with captiveType=SAML.
  3. Activate the WLAN at the venue (ALWAYS_ON) and confirm it completes.
  4. Deactivate from the venue.
  5. Cleanup: delete WLAN, portal profile, SAML IdP profile, venue.
