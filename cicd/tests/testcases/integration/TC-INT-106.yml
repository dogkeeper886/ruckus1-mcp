id: TC-INT-106
name: Query directory server profiles with search
suite: integration
tags: [directory-server]
story: STORY-005
priority: 2
timeout: 30000
dependencies: []

steps:
  - name: Query directory server profiles with search and pagination
    command: npx tsx cicd/tests/src/mcp-client.ts query_directory_server_profiles '{"pageSize":5,"sortField":"name","sortOrder":"ASC"}'
    expectPatterns:
      - "content"
      - "text"
    rejectPatterns:
      - "isError"

criteria: |
  Verify query_directory_server_profiles accepts search and pagination parameters.
  - pageSize, sortField, sortOrder parameters work without error
  - Response contains valid MCP content structure
