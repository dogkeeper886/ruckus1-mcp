id: TC-INT-003
name: Get RUCKUS venues returns venue list
suite: integration
tags: [venues]
story: STORY-002
priority: 1
timeout: 30000
dependencies: []

steps:
  - name: List all venues
    command: npx tsx cicd/tests/src/mcp-client.ts get_ruckus_venues '{}'
    expectPatterns:
      - "totalCount"
      - "data"
    rejectPatterns:
      - "isError"

criteria: |
  Verify get_ruckus_venues returns a list of venues from RUCKUS One.
  - Response contains venue data with venueId and venueName fields
  - No error is returned
