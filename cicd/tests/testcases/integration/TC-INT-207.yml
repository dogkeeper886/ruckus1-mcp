id: TC-INT-207
name: Directory server profile CRUD lifecycle - create, verify, delete
suite: integration
tags: [directory-server]
story: STORY-005
priority: 1
timeout: 120000
dependencies:
  - TC-INT-001

steps:
  - name: Create directory server profile
    command: npx tsx cicd/tests/src/mcp-client.ts create_directory_server_profile '{"name":"mcp-test-ldap","type":"LDAP","tlsEnabled":false,"host":"10.99.99.99","port":389,"domainName":"dc=test,dc=com","adminDomainName":"cn=admin,dc=test,dc=com","adminPassword":"TestPass123","identityName":"uid","identityEmail":"mail","identityPhone":"telephoneNumber","keyAttribute":"uid","attributeMappings":[{"name":"firstName","mappedByName":"givenName"}],"maxRetries":10,"pollIntervalMs":3000}'
    expectPatterns:
      - "content"
    rejectPatterns:
      - "isError"

  - name: Find created profile and capture ID
    command: npx tsx cicd/tests/src/mcp-client.ts query_directory_server_profiles '{"searchString":"mcp-test-ldap"}'
    capture:
      profileId: "data[name=mcp-test-ldap].id"
    expectPatterns:
      - "mcp-test-ldap"
    rejectPatterns:
      - "isError"

  - name: Delete directory server profile
    command: npx tsx cicd/tests/src/mcp-client.ts delete_directory_server_profile '{"profileId":"{{profileId}}","maxRetries":10,"pollIntervalMs":3000}'
    expectPatterns:
      - "completed"
    rejectPatterns:
      - "isError"

  - name: Verify profile is gone
    command: npx tsx cicd/tests/src/mcp-client.ts query_directory_server_profiles '{"searchString":"mcp-test-ldap"}'
    expectPatterns:
      - "totalCount"
    rejectPatterns:
      - "mcp-test-ldap"

criteria: |
  Full directory server profile CRUD lifecycle:
  1. Create LDAP profile "mcp-test-ldap" with test server config
  2. Query to find it and capture profileId
  3. Delete using captured profileId
  4. Verify it no longer appears in query results
