id: TC-INT-207
name: Directory server profile CRUD lifecycle - create, partial-update, verify, delete
suite: integration
tags: [directory-server]
story: STORY-005
priority: 1
timeout: 120000
dependencies:
  - TC-INT-001

steps:
  - name: Create directory server profile (config-object create)
    command: npx tsx cicd/tests/src/mcp-client.ts create_directory_server_profile '{"profileConfig":{"name":"mcp-test-ldap-{{TEST_RUN_ID}}","type":"LDAP","tlsEnabled":false,"host":"10.99.99.99","port":389,"domainName":"dc=test,dc=com","adminDomainName":"cn=admin,dc=test,dc=com","adminPassword":"TestPass123","identityName":"uid","identityEmail":"mail","identityPhone":"telephoneNumber","keyAttribute":"uid","attributeMappings":[{"name":"firstName","mappedByName":"givenName"}]},"maxRetries":10,"pollIntervalMs":3000}'
    expectPatterns:
      - "completed"
      - "requestId"
    rejectPatterns:
      - "isError"

  - name: Find created profile and capture ID
    command: npx tsx cicd/tests/src/mcp-client.ts query_directory_server_profiles '{"searchString":"mcp-test-ldap-{{TEST_RUN_ID}}"}'
    capture:
      profileId: "data[name=mcp-test-ldap-{{TEST_RUN_ID}}].id"
    expectPatterns:
      - "mcp-test-ldap-{{TEST_RUN_ID}}"
    rejectPatterns:
      - "isError"

  - name: Partial update - change only host (retrieve-then-merge)
    command: npx tsx cicd/tests/src/mcp-client.ts update_directory_server_profile '{"profileId":"{{profileId}}","profileConfig":{"host":"10.88.88.88"},"maxRetries":10,"pollIntervalMs":3000}'
    expectPatterns:
      - "completed"
    rejectPatterns:
      - "isError"

  - name: Get profile - verify host changed and unspecified fields preserved
    command: npx tsx cicd/tests/src/mcp-client.ts get_directory_server_profile '{"profileId":"{{profileId}}"}'
    expectPatterns:
      - "10.88.88.88"
      - "mcp-test-ldap-{{TEST_RUN_ID}}"
      - "dc=test,dc=com"
      - "TestPass123"
    rejectPatterns:
      - "isError"

  - name: Delete directory server profile
    command: npx tsx cicd/tests/src/mcp-client.ts delete_directory_server_profile '{"profileId":"{{profileId}}","maxRetries":10,"pollIntervalMs":3000}'
    expectPatterns:
      - "completed"
    rejectPatterns:
      - "isError"

  - name: Verify profile is gone
    command: npx tsx cicd/tests/src/mcp-client.ts query_directory_server_profiles '{"searchString":"mcp-test-ldap-{{TEST_RUN_ID}}"}'
    expectPatterns:
      - "totalCount"
    rejectPatterns:
      - "{{profileId}}"

criteria: |
  Full directory server profile CRUD lifecycle, incl. STORY-023 partial update:
  1. Create LDAP profile "mcp-test-ldap-{{TEST_RUN_ID}}" (host 10.99.99.99, port 389,
     adminPassword TestPass123, domainName dc=test,dc=com)
  2. Query to find it and capture profileId
  3. Partial update via update_directory_server_profile with profileConfig {host:"10.88.88.88"}
     only — retrieve-then-merge (JSON Merge Patch).
  4. GET the profile and verify the new host (10.88.88.88) AND that unspecified fields were
     preserved (name, domainName, adminPassword) — proving the merge did not clear them,
     and that the GET-returned adminPassword survives the round-trip.
  5. Delete using captured profileId
  6. Verify it no longer appears in query results
