id: TC-INT-302
name: Create venue with missing required fields returns error
suite: integration
tags: [venues]
story: STORY-002
priority: 3
timeout: 30000
dependencies: []

steps:
  - name: Create venue without city (required field)
    command: npx tsx cicd/tests/src/mcp-client.ts create_ruckus_venue '{"name":"test-incomplete"}'
    expectError: true
    expectPatterns:
      - "isError"
    rejectPatterns:
      - "completed"

criteria: |
  Verify create_ruckus_venue rejects requests with missing required fields.
  - Missing required fields (addressLine, city, country) trigger error
  - Response contains isError flag
  - No venue is created
