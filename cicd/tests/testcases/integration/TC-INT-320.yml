id: TC-INT-320
name: OWE Transition WiFi network lifecycle - create, activate, deactivate, delete
suite: integration
tags: [wifi-networks, owe]
story: STORY-012
priority: 1
timeout: 300000
dependencies:
  - TC-INT-001

steps:
  - name: Create test venue for OWE activation
    command: npx tsx cicd/tests/src/mcp-client.ts create_ruckus_venue '{"name":"mcp-test-venue-owe","addressLine":"Taipei","city":"Taipei","country":"Taiwan","maxRetries":10,"pollIntervalMs":3000}'
    expectPatterns:
      - "completed"
      - "requestId"
    rejectPatterns:
      - "isError"
      - "\"status\": \"failed\""

  - name: Capture venue ID
    command: npx tsx cicd/tests/src/mcp-client.ts get_ruckus_venues '{}'
    capture:
      venueId: "data[name=mcp-test-venue-owe].id"
    expectPatterns:
      - "mcp-test-venue-owe"
    rejectPatterns:
      - "isError"

  - name: Create OWE Transition WiFi network
    command: npx tsx cicd/tests/src/mcp-client.ts create_wifi_network '{"name":"mcp-test-wifi-owe","ssid":"MCP-Test-OWE","type":"open","wlanSecurity":"Open","oweEnabled":true,"oweTransitionEnabled":true,"maxRetries":10,"pollIntervalMs":3000}'
    expectPatterns:
      - "networkId"
      - "completed"
    rejectPatterns:
      - "isError"
      - "\"status\": \"failed\""

  - name: Verify dual-network pair created with OWE fields
    command: npx tsx cicd/tests/src/mcp-client.ts query_wifi_networks '{"searchString":"mcp-test-wifi-owe"}'
    capture:
      networkId: "data[name=mcp-test-wifi-owe].id"
      companionId: "data[name=mcp-test-wifi-owe-owe-tr].id"
    expectPatterns:
      - "mcp-test-wifi-owe"
      - "mcp-test-wifi-owe-owe-tr"
      - "OWETransition"
      - "isOweMaster"
      - "owePairNetworkId"
    rejectPatterns:
      - "isError"

  - name: Activate OWE network at venue
    command: npx tsx cicd/tests/src/mcp-client.ts activate_wifi_network_at_venues '{"networkId":"{{networkId}}","venueConfigs":[{"venueId":"{{venueId}}","isAllApGroups":true,"allApGroupsRadio":"Both","allApGroupsRadioTypes":["2.4-GHz","5-GHz","6-GHz"],"scheduler":{"type":"ALWAYS_ON"}}],"maxRetries":10,"pollIntervalMs":3000}'
    expectPatterns:
      - "completed"
    rejectPatterns:
      - "isError"
      - "\"status\": \"failed\""
      - "owePairNetworkId"
      - "isOweMaster"

  - name: Deactivate OWE network from venue
    command: npx tsx cicd/tests/src/mcp-client.ts deactivate_wifi_network_at_venues '{"networkId":"{{networkId}}","venueIds":["{{venueId}}"],"maxRetries":10,"pollIntervalMs":3000}'
    expectPatterns:
      - "completed"
    rejectPatterns:
      - "isError"
      - "\"status\": \"failed\""

  - name: Delete OWE WiFi network
    command: npx tsx cicd/tests/src/mcp-client.ts delete_wifi_network '{"networkId":"{{networkId}}","maxRetries":10,"pollIntervalMs":3000}'
    expectPatterns:
      - "completed"
    rejectPatterns:
      - "isError"
      - "\"status\": \"failed\""

  - name: Verify OWE network and companion are gone
    command: npx tsx cicd/tests/src/mcp-client.ts query_wifi_networks '{"searchString":"mcp-test-wifi-owe"}'
    expectPatterns:
      - "content"
    rejectPatterns:
      - "{{networkId}}"
      - "{{companionId}}"

  - name: Delete test venue
    command: npx tsx cicd/tests/src/mcp-client.ts delete_ruckus_venue '{"venueId":"{{venueId}}","maxRetries":10,"pollIntervalMs":3000}'
    expectPatterns:
      - "completed"
    rejectPatterns:
      - "isError"
      - "\"status\": \"failed\""

criteria: |
  Full OWE Transition WiFi network lifecycle:
  1. Create a test venue for activation
  2. Create OWE Transition network (type=open, oweEnabled=true, oweTransitionEnabled=true)
  3. Verify dual-network pair created (primary + -owe-tr companion)
  4. Verify securityProtocol=OWETransition, isOweMaster, owePairNetworkId in query
  5. Activate at venue - verify no 422 errors from read-only fields
  6. Deactivate from venue
  7. Delete network and verify both primary and companion are removed
  8. Clean up test venue
