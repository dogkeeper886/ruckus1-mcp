id: TC-INT-303
name: Delete venue with invalid venueId returns error
suite: integration
tags: [venues]
story: STORY-002
priority: 3
timeout: 30000
dependencies: []

steps:
  - name: Delete venue with non-existent ID
    command: npx tsx cicd/tests/src/mcp-client.ts delete_ruckus_venue '{"venueId":"00000000-0000-0000-0000-000000000000","maxRetries":3,"pollIntervalMs":1000}'
    expectPatterns:
      - timeout
      - polling timeout
      - Failed to get activity status
    rejectPatterns:
      - completed
      - Venue deleted successfully

criteria: |
  Verify delete_ruckus_venue handles non-existent venue ID gracefully. The RUCKUS
  backend accepts the POST and returns a requestId but never actually creates the
  activity record, so every getRuckusActivityDetails poll returns 404. The tool's
  polling loop swallows the 404s in its catch branch and eventually returns
  status:"timeout" after maxRetries.

  Asserts "timeout"/"polling timeout"/"Failed to get activity status" — the three
  stable substrings that are only present on the timeout path. Rejects "completed"
  and the "Venue deleted successfully" success message.

  Note: overrides polling to maxRetries=3, pollIntervalMs=1000 (~3s budget) so the
  negative-path test stays fast and is decoupled from service-layer defaults.
