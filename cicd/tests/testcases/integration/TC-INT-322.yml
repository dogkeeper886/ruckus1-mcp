id: TC-INT-322
name: DPSK Service lifecycle - create, partial-update, query, delete
suite: integration
tags: [dpsk-services, identity-groups]
story: STORY-012
priority: 1
timeout: 180000
dependencies:
  - TC-INT-001

steps:
  - name: Create identity group for DPSK service
    command: npx tsx cicd/tests/src/mcp-client.ts create_identity_group '{"name":"mcp-test-idgroup-dpsk-ci-{{TEST_RUN_ID}}","maxRetries":10,"pollIntervalMs":3000}'
    expectPatterns:
      - "completed"
      - "requestId"
    rejectPatterns:
      - "isError"

  - name: Capture identity group ID
    command: npx tsx cicd/tests/src/mcp-client.ts query_identity_groups '{"keyword":"mcp-test-idgroup-dpsk-ci-{{TEST_RUN_ID}}"}'
    capture:
      identityGroupId: "content[name=mcp-test-idgroup-dpsk-ci-{{TEST_RUN_ID}}].id"
    expectPatterns:
      - "mcp-test-idgroup-dpsk-ci-{{TEST_RUN_ID}}"
    rejectPatterns:
      - "isError"

  - name: Create DPSK service under identity group
    command: npx tsx cicd/tests/src/mcp-client.ts create_dpsk_service '{"identityGroupId":"{{identityGroupId}}","name":"mcp-test-dpsk-ci-{{TEST_RUN_ID}}","maxRetries":10,"pollIntervalMs":3000}'
    expectPatterns:
      - "completed"
      - "requestId"
    rejectPatterns:
      - "isError"

  - name: Query DPSK services and verify created
    command: npx tsx cicd/tests/src/mcp-client.ts query_dpsk_services '{}'
    capture:
      dpskServiceId: "content[name=mcp-test-dpsk-ci-{{TEST_RUN_ID}}].id"
    expectPatterns:
      - "mcp-test-dpsk-ci-{{TEST_RUN_ID}}"
    rejectPatterns:
      - "isError"

  - name: Partial update - change only passphraseLength (retrieve-then-merge + reshape)
    command: npx tsx cicd/tests/src/mcp-client.ts update_dpsk_service '{"dpskServiceId":"{{dpskServiceId}}","serviceConfig":{"passphraseLength":20},"maxRetries":10,"pollIntervalMs":3000}'
    expectPatterns:
      - "completed"
    rejectPatterns:
      - "isError"

  - name: Get DPSK service - verify length changed and name/identity preserved
    command: npx tsx cicd/tests/src/mcp-client.ts get_dpsk_service '{"dpskServiceId":"{{dpskServiceId}}"}'
    expectPatterns:
      - "mcp-test-dpsk-ci-{{TEST_RUN_ID}}"
      - "passphraseLength[^0-9]*20"
      - "{{identityGroupId}}"
    rejectPatterns:
      - "isError"

  - name: Delete DPSK service
    command: npx tsx cicd/tests/src/mcp-client.ts delete_dpsk_service '{"dpskServiceId":"{{dpskServiceId}}","maxRetries":10,"pollIntervalMs":3000}'
    expectPatterns:
      - "completed"
    rejectPatterns:
      - "isError"

  - name: Delete identity group
    command: npx tsx cicd/tests/src/mcp-client.ts delete_identity_group '{"identityGroupId":"{{identityGroupId}}","maxRetries":10,"pollIntervalMs":3000}'
    expectPatterns:
      - "completed"
    rejectPatterns:
      - "isError"

criteria: |
  Full DPSK Service lifecycle with identity group dependency, incl. STORY-023 partial update:
  1. Create identity group (prerequisite)
  2. Create DPSK service under identity group (defaults: passphraseLength 18)
  3. Query to verify it exists and capture ID
  4. Partial update via update_dpsk_service with serviceConfig {passphraseLength:20} only —
     retrieve-then-merge with a GET→PUT reshape (the PUT uses identityIds[] where the GET
     returns scalar identityGroupId).
  5. get_dpsk_service and verify the new length (20) AND that name + identity group were
     preserved through the reshape.
  6. Delete DPSK service
  7. Delete identity group (cleanup)
