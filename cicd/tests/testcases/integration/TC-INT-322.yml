id: TC-INT-322
name: DPSK Service lifecycle - create, query, delete
suite: integration
tags: [dpsk-services, identity-groups]
story: STORY-012
priority: 1
timeout: 180000
dependencies:
  - TC-INT-001

steps:
  - name: Create identity group for DPSK service
    command: npx tsx cicd/tests/src/mcp-client.ts create_identity_group '{"name":"mcp-test-idgroup-dpsk-ci","maxRetries":10,"pollIntervalMs":3000}'
    expectPatterns:
      - "completed"
      - "requestId"
    rejectPatterns:
      - "isError"

  - name: Capture identity group ID
    command: npx tsx cicd/tests/src/mcp-client.ts query_identity_groups '{"keyword":"mcp-test-idgroup-dpsk-ci"}'
    capture:
      identityGroupId: "content[name=mcp-test-idgroup-dpsk-ci].id"
    expectPatterns:
      - "mcp-test-idgroup-dpsk-ci"
    rejectPatterns:
      - "isError"

  - name: Create DPSK service under identity group
    command: npx tsx cicd/tests/src/mcp-client.ts create_dpsk_service '{"identityGroupId":"{{identityGroupId}}","name":"mcp-test-dpsk-ci","maxRetries":10,"pollIntervalMs":3000}'
    expectPatterns:
      - "completed"
      - "requestId"
    rejectPatterns:
      - "isError"

  - name: Query DPSK services and verify created
    command: npx tsx cicd/tests/src/mcp-client.ts query_dpsk_services '{}'
    capture:
      dpskServiceId: "content[name=mcp-test-dpsk-ci].id"
    expectPatterns:
      - "mcp-test-dpsk-ci"
    rejectPatterns:
      - "isError"

  - name: Delete DPSK service
    command: npx tsx cicd/tests/src/mcp-client.ts delete_dpsk_service '{"dpskServiceId":"{{dpskServiceId}}","maxRetries":10,"pollIntervalMs":3000}'
    expectPatterns:
      - "completed"
    rejectPatterns:
      - "isError"

  - name: Delete identity group
    command: npx tsx cicd/tests/src/mcp-client.ts delete_identity_group '{"identityGroupId":"{{identityGroupId}}","maxRetries":10,"pollIntervalMs":3000}'
    expectPatterns:
      - "completed"
    rejectPatterns:
      - "isError"

criteria: |
  Full DPSK Service lifecycle with identity group dependency:
  1. Create identity group (prerequisite)
  2. Create DPSK service under identity group
  3. Query to verify it exists and capture ID
  4. Delete DPSK service
  5. Delete identity group (cleanup)
