id: TC-INT-017
name: Query clients returns results
suite: integration
tags: [clients]
story: STORY-011
priority: 1
timeout: 30000
dependencies: []

steps:
  - name: Query clients with default parameters
    command: npx tsx cicd/tests/src/mcp-client.ts query_clients '{}'
