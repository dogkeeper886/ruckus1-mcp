id: TC-INT-006
name: Get AP groups returns list
suite: integration
story: STORY-003
priority: 1
timeout: 30000
dependencies: []

steps:
  - name: Query AP groups from RUCKUS One
    command: npx tsx cicd/tests/src/mcp-client.ts get_ruckus_ap_groups '{}'
    expectPatterns:
      - "totalCount"
      - "data"
