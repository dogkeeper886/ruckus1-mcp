id: TC-INT-326
name: Self Sign-In network with temporaryConnection round-trip
suite: integration
tags: [wifi-networks, guest-portal, temporary-connection]
story: STORY-009
priority: 1
timeout: 300000
dependencies:
  - TC-INT-001

steps:
  - name: Create portal service profile
    command: npx tsx cicd/tests/src/mcp-client.ts create_portal_service_profile '{"name":"mcp-test-portal-tc","content":{},"maxRetries":10,"pollIntervalMs":3000}'
    expectPatterns:
      - "requestId"
    rejectPatterns:
      - "isError"
      - "\"status\": \"failed\""

  - name: Capture portal profile ID
    command: npx tsx cicd/tests/src/mcp-client.ts query_portal_service_profiles '{"searchString":"mcp-test-portal-tc"}'
    capture:
      profileId: "content[serviceName=mcp-test-portal-tc].id"
    expectPatterns:
      - "mcp-test-portal-tc"
    rejectPatterns:
      - "isError"

  - name: Create Self Sign-In WiFi network with temporaryConnection enabled
    command: npx tsx cicd/tests/src/mcp-client.ts create_wifi_network '{"name":"mcp-test-wifi-tc","ssid":"MCP-Test-TC","type":"selfSignIn","wlanSecurity":"None","portalServiceProfileId":"{{profileId}}","allowedEmailDomains":["example.com"],"temporaryConnectionEnabled":true,"temporaryConnection":{"duration":10,"maxDownloadRate":5000,"maxUploadRate":512},"maxRetries":10,"pollIntervalMs":3000}'
    expectPatterns:
      - "networkId"
      - "completed"
    rejectPatterns:
      - "isError"
      - "\"status\": \"failed\""

  - name: Capture network ID
    command: npx tsx cicd/tests/src/mcp-client.ts query_wifi_networks '{"searchString":"mcp-test-wifi-tc"}'
    capture:
      networkId: "data[name=mcp-test-wifi-tc].id"
    expectPatterns:
      - "mcp-test-wifi-tc"
    rejectPatterns:
      - "isError"

  - name: GET network - verify temporaryConnection fields round-trip
    command: npx tsx cicd/tests/src/mcp-client.ts get_wifi_network '{"networkId":"{{networkId}}"}'
    expectPatterns:
      - "temporaryConnectionEnabled"
      - "temporaryConnection"
      - "duration"
      - "maxDownloadRate"
      - "maxUploadRate"
      - "5000"
      - "512"
    rejectPatterns:
      - "isError"

  - name: Delete WiFi network
    command: npx tsx cicd/tests/src/mcp-client.ts delete_wifi_network '{"networkId":"{{networkId}}","maxRetries":10,"pollIntervalMs":3000}'
    expectPatterns:
      - "completed"
    rejectPatterns:
      - "isError"
      - "\"status\": \"failed\""

  - name: Delete portal service profile
    command: npx tsx cicd/tests/src/mcp-client.ts delete_portal_service_profile '{"profileId":"{{profileId}}","maxRetries":10,"pollIntervalMs":3000}'
    expectPatterns:
      - "completed"
    rejectPatterns:
      - "isError"
      - "\"status\": \"failed\""

criteria: |
  Verifies create_wifi_network supports temporaryConnection for Self Sign-In networks
  and the fields round-trip through get_wifi_network:
  1. Create a self-contained portal service profile
  2. Create a Self Sign-In network with temporaryConnectionEnabled=true and bandwidth caps
  3. GET network — assert temporaryConnectionEnabled, temporaryConnection, duration, maxDownloadRate, maxUploadRate fields are present
  4. Cleanup: delete network, delete portal profile

  Note: update_wifi_network round-trip is not exercised here because update_wifi_network
  is a pass-through that requires the full network config (type, name, ssid, wlanSecurity,
  plus existing nested objects) in the PUT body — a partial update with only guestPortal
  gets rejected by R1 as "missing type id property 'type'". Proper update testing requires
  a retrieve-then-merge-then-PUT pattern; deferred.
