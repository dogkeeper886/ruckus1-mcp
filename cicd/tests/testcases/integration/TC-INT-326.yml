id: TC-INT-326
name: Self Sign-In network with temporaryConnection round-trip
suite: integration
tags: [wifi-networks, wifi-self-sign-in, guest-portal, temporary-connection]
story: STORY-009
priority: 1
timeout: 300000
dependencies:
  - TC-INT-001

steps:
  - name: Create portal service profile
    command: npx tsx cicd/tests/src/mcp-client.ts create_portal_service_profile '{"name":"mcp-test-portal-tc-{{TEST_RUN_ID}}","content":{},"maxRetries":10,"pollIntervalMs":3000}'
    expectPatterns:
      - "requestId"
    rejectPatterns:
      - "isError"

  - name: Capture portal profile ID
    command: npx tsx cicd/tests/src/mcp-client.ts query_portal_service_profiles '{"searchString":"mcp-test-portal-tc-{{TEST_RUN_ID}}"}'
    capture:
      profileId: "content[serviceName=mcp-test-portal-tc-{{TEST_RUN_ID}}].id"
    expectPatterns:
      - "mcp-test-portal-tc-{{TEST_RUN_ID}}"
    rejectPatterns:
      - "isError"

  - name: Create Self Sign-In WiFi network with temporaryConnection enabled
    command: npx tsx cicd/tests/src/mcp-client.ts create_wifi_network '{"name":"mcp-test-wifi-tc-{{TEST_RUN_ID}}","ssid":"MCP-Test-TC","type":"selfSignIn","wlanSecurity":"None","portalServiceProfileId":"{{profileId}}","allowedEmailDomains":["example.com"],"temporaryConnectionEnabled":true,"temporaryConnection":{"duration":10,"maxDownloadRate":5000,"maxUploadRate":512},"maxRetries":10,"pollIntervalMs":3000}'
    expectPatterns:
      - "networkId"
      - "completed"
    rejectPatterns:
      - "isError"

  - name: Capture network ID
    command: npx tsx cicd/tests/src/mcp-client.ts query_wifi_networks '{"searchString":"mcp-test-wifi-tc-{{TEST_RUN_ID}}"}'
    capture:
      networkId: "data[name=mcp-test-wifi-tc-{{TEST_RUN_ID}}].id"
    expectPatterns:
      - "mcp-test-wifi-tc-{{TEST_RUN_ID}}"
    rejectPatterns:
      - "isError"

  - name: GET network - verify temporaryConnection fields round-trip
    command: npx tsx cicd/tests/src/mcp-client.ts get_wifi_network '{"networkId":"{{networkId}}"}'
    expectPatterns:
      - "temporaryConnectionEnabled"
      - "temporaryConnection"
      - "duration"
      - "maxDownloadRate"
      - "maxUploadRate"
      - "5000"
      - "512"
    rejectPatterns:
      - "isError"

  - name: Partial update via update_wifi_network - add walled garden (retrieve-then-merge)
    command: npx tsx cicd/tests/src/mcp-client.ts update_wifi_network '{"networkId":"{{networkId}}","networkConfig":{"guestPortal":{"walledGardens":["walled.example.net"]}},"maxRetries":10,"pollIntervalMs":3000}'
    expectPatterns:
      - "completed"
    rejectPatterns:
      - "isError"

  - name: GET network - verify walled garden persisted and temporaryConnection preserved
    command: npx tsx cicd/tests/src/mcp-client.ts get_wifi_network '{"networkId":"{{networkId}}"}'
    expectPatterns:
      - "walledGardens"
      - "walled.example.net"
      - "temporaryConnectionEnabled"
    rejectPatterns:
      - "isError"

  - name: Delete WiFi network
    command: npx tsx cicd/tests/src/mcp-client.ts delete_wifi_network '{"networkId":"{{networkId}}","maxRetries":10,"pollIntervalMs":3000}'
    expectPatterns:
      - "completed"
    rejectPatterns:
      - "isError"

  - name: Delete portal service profile
    command: npx tsx cicd/tests/src/mcp-client.ts delete_portal_service_profile '{"profileId":"{{profileId}}","maxRetries":10,"pollIntervalMs":3000}'
    expectPatterns:
      - "completed"
    rejectPatterns:
      - "isError"

criteria: |
  Verifies create_wifi_network supports temporaryConnection for Self Sign-In networks
  and the fields round-trip through get_wifi_network, and that update_wifi_network applies
  a PARTIAL config via retrieve-then-merge (STORY-022):
  1. Create a self-contained portal service profile
  2. Create a Self Sign-In network with temporaryConnectionEnabled=true and bandwidth caps
  3. GET network — assert temporaryConnectionEnabled, temporaryConnection, duration, maxDownloadRate, maxUploadRate fields are present
  4. update_wifi_network with ONLY { guestPortal: { walledGardens: ["walled.example.net"] } }
     — a partial config (no type/name/ssid). The tool retrieves the current config, merges
     the patch, and PUTs the full body.
  5. GET network — assert walledGardens contains "walled.example.net" AND temporaryConnectionEnabled
     is still present (proves the merge added the new field without wiping existing ones).
  6. Cleanup: delete network, delete portal profile

  This un-defers the update_wifi_network round-trip that was previously impossible: it no
  longer requires the caller to supply the full config, because the tool now does
  retrieve-then-merge (JSON Merge Patch) internally.
